<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>어드민 로그인 — 제로백스쿨</title>
  <link rel="icon" href="/logo-zero100-square.png" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <style>
    :root {
      --ink: #0B1B34; --violet: #7A2E9C; --magenta: #E6197E;
      --grad: linear-gradient(120deg, #7A2E9C, #E6197E);
      --line: rgba(255,255,255,0.1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard Variable', -apple-system, sans-serif;
      background: var(--ink); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(50% 50% at 80% 18%, rgba(230,25,126,0.16), transparent 70%),
        radial-gradient(50% 50% at 14% 86%, rgba(122,46,156,0.20), transparent 64%);
    }
    .card {
      position: relative;
      background: rgba(255,255,255,0.045); border: 1px solid var(--line);
      border-radius: 18px; padding: 44px 38px; width: 100%; max-width: 400px;
      backdrop-filter: blur(12px); box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo img { height: 36px; width: auto; margin: 0 auto 14px; display: block; }
    .logo p { color: rgba(255,255,255,0.45); font-size: 0.84rem; }
    label { display: block; color: rgba(255,255,255,0.7); font-size: 0.82rem; font-weight: 600; margin-bottom: 8px; }
    input[type="password"] {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--line);
      border-radius: 10px; color: #fff; font-size: 0.95rem; font-family: inherit;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    input[type="password"]:focus { border-color: var(--magenta); box-shadow: 0 0 0 3px rgba(230,25,126,0.22); }
    .error {
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px; padding: 11px 14px; color: #fca5a5; font-size: 0.82rem; margin-bottom: 18px;
    }
    button {
      width: 100%; margin-top: 22px; background: var(--grad); color: #fff; border: none;
      padding: 14px; border-radius: 10px; font-size: 0.95rem; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: filter .2s, transform .1s;
    }
    button:hover { filter: brightness(1.08); transform: translateY(-1px); }
    button:focus-visible, input:focus-visible { outline: 2.5px solid var(--magenta); outline-offset: 3px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/logo-zero100-white.png" alt="제로백스쿨 ZERO100" />
      <p>어드민 관리 패널</p>
    </div>
    <form method="POST" action="/admin/login">
      <div id="error-msg" style="display:none" class="error">❌ 비밀번호가 올바르지 않습니다.</div>
      <div>
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="어드민 비밀번호 입력" autofocus required />
      </div>
      <button type="submit">로그인</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error-msg').style.display = 'block';
    }
  </script>
</body>
</html>
