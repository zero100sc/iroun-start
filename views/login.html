<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>어드민 로그인 — 이로운스타트</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%; max-width: 400px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #1B3A6B, #FF6B2B);
      border-radius: 12px; margin: 0 auto 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; color: #fff; font-weight: 900;
    }
    .logo h1 { color: #f1f5f9; font-size: 1.2rem; font-weight: 800; }
    .logo p  { color: #64748b; font-size: 0.82rem; margin-top: 4px; }
    label { display: block; color: #94a3b8; font-size: 0.82rem; font-weight: 600; margin-bottom: 8px; }
    input[type="password"] {
      width: 100%; padding: 12px 16px;
      background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #f1f5f9; font-size: 0.95rem;
      outline: none; transition: border-color .2s;
    }
    input[type="password"]:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
    .error {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; padding: 10px 14px;
      color: #fca5a5; font-size: 0.82rem; margin-bottom: 20px;
    }
    button {
      width: 100%; margin-top: 20px;
      background: linear-gradient(135deg, #1B3A6B, #2563eb);
      color: #fff; border: none; padding: 13px;
      border-radius: 8px; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: opacity .2s;
    }
    button:hover { opacity: .88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">이</div>
      <h1>이로운스타트 어드민</h1>
      <p>상담 신청 관리 패널</p>
    </div>
    <form method="POST" action="/admin/login">
      <div id="error-msg" style="display:none" class="error">
        ❌ 비밀번호가 올바르지 않습니다.
      </div>
      <div style="margin-bottom:16px">
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="어드민 비밀번호 입력" autofocus required />
      </div>
      <button type="submit">로그인</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error-msg').style.display = 'block';
    }
  </script>
</body>
</html>
